name: Publish to PyPI

# Builds and publishes the package when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret required.
# One-time setup on PyPI: Project → Publishing → add a GitHub Actions trusted
# publisher for owner d01ki, repo AIBOM-Inspector, workflow release.yml,
# environment pypi.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Build sdist + wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
