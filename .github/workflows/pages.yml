name: Deploy web UI to GitHub Pages

# Optional manual publication of the static single-page UI to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". The deployed page has an editable "API endpoint" field —
# point it at your running backend (see the Dockerfile / README).

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
