# One-command startup: `docker compose up` -> UI + API at http://localhost:8000
# Port 8000 taken? Override the host port:  AIBOM_PORT=8080 docker compose up
services:
  aibom:
    build: .
    image: aibom-inspector
    ports:
      - "${AIBOM_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
